name: CI — Quality Gates + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  quality-gates:
    name: Build & Quality Gates
    runs-on: ubuntu-latest

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Gate 1: Build ───────────────────────────────────────────────────────
      - name: Build
        id: build
        continue-on-error: true
        run: npm run build
        env:
          VITE_BASE_PATH: /ai-sdlc-dashboard/

      # ── Playwright browser cache ────────────────────────────────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + system deps (first time)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── Gate 2: Unit Tests + Coverage ──────────────────────────────────────
      - name: Unit Tests & Coverage
        id: unit-tests
        continue-on-error: true
        run: |
          npm run test:coverage 2>&1 | tee /tmp/unit-test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

      # ── Gate 3: E2E Behavioural Tests ──────────────────────────────────────
      - name: E2E Tests (Playwright)
        id: e2e-tests
        continue-on-error: true
        run: |
          npm run test:e2e 2>&1 | tee /tmp/e2e-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload E2E Test Results (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e
          path: test-results/playwright-results.json
          if-no-files-found: ignore

      # ── Gate 4: Accessibility — WCAG 2.1 AA ────────────────────────────────
      - name: Accessibility Tests (WCAG 2.1 AA)
        id: a11y
        continue-on-error: true
        run: |
          npm run test:a11y 2>&1 | tee /tmp/a11y-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload Accessibility Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: playwright-report-a11y/
          if-no-files-found: ignore

      - name: Upload A11y Test Results (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-a11y
          path: test-results/a11y-results.json
          if-no-files-found: ignore

      # ── Gate 5: Vulnerability Check ─────────────────────────────────────────
      - name: Vulnerability Check (npm audit)
        id: vuln-check
        continue-on-error: true
        run: npm audit --audit-level=high

      # ── Report: Go / No-Go Dashboard ───────────────────────────────────────
      - name: Generate Go/No-Go Report
        if: always()
        env:
          BUILD:      ${{ steps.build.outcome }}
          TESTS:      ${{ steps.unit-tests.outcome }}
          E2E:        ${{ steps.e2e-tests.outcome }}
          A11Y:       ${{ steps.a11y.outcome }}
          VULN_CHECK: ${{ steps.vuln-check.outcome }}
        run: |
          icon()       { [ "$1" = "success" ] && echo "✅ Pass" || echo "❌ Fail"; }
          strip_ansi() { sed 's/\x1B\[[0-9;]*[mGKHF]//g' "$1" 2>/dev/null || echo "Output not available"; }

          PASS=true
          for s in "$BUILD" "$TESTS" "$E2E" "$A11Y" "$VULN_CHECK"; do
            [ "$s" != "success" ] && PASS=false
          done

          if [ "$PASS" = true ]; then
            CONCLUSION="✅ **Go**"
            CONCLUSION_TEXT="All quality gates passed. Safe to deploy."
          else
            CONCLUSION="❌ **No-Go**"
            CONCLUSION_TEXT="One or more quality gates failed. Do not deploy."
          fi

          UNIT_SUMMARY=$(grep -E "^ *Tests " /tmp/unit-test-output.txt 2>/dev/null | tail -1 \
            | sed 's/^ *//' | sed 's/\x1B\[[0-9;]*[mGKHF]//g' || echo "unavailable")
          E2E_SUMMARY=$(grep -E "[0-9]+ (passed|failed)" /tmp/e2e-output.txt 2>/dev/null | tail -1 \
            | sed 's/^ *//' | sed 's/\x1B\[[0-9;]*[mGKHF]//g' || echo "unavailable")
          A11Y_SUMMARY=$(grep -E "[0-9]+ (passed|failed)" /tmp/a11y-output.txt 2>/dev/null | tail -1 \
            | sed 's/^ *//' | sed 's/\x1B\[[0-9;]*[mGKHF]//g' || echo "unavailable")

          # ── Main gate table ────────────────────────────────────────────────
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # 📊 Build Quality Report

          | Gate | Check | Status | Threshold |
          |------|-------|--------|-----------|
          | 1 | Build | $(icon $BUILD) | Vite build completes without errors |
          | 2 | Unit Tests & Coverage | $(icon $TESTS) | 99 tests pass · stmts ≥ 80% · fns ≥ 80% · branches ≥ 75% · lines ≥ 80% |
          | 3 | E2E Tests (Playwright) | $(icon $E2E) | All 35 behavioural tests pass |
          | 4 | Accessibility — WCAG 2.1 AA | $(icon $A11Y) | 0 axe-core violations (light + dark mode) |
          | 5 | Vulnerability Check (npm audit) | $(icon $VULN_CHECK) | 0 high-severity advisories |

          EOF

          # ── Collapsible: Unit Test Results ────────────────────────────────
          {
            echo "<details>"
            echo "<summary>🧪 Unit Test Results — ${UNIT_SUMMARY}</summary>"
            echo ""
            echo '```'
            strip_ansi /tmp/unit-test-output.txt
            echo '```'
            echo ""
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Collapsible: E2E Test Results ─────────────────────────────────
          {
            echo "<details>"
            echo "<summary>🎭 E2E Test Results (Playwright) — ${E2E_SUMMARY}</summary>"
            echo ""
            echo '```'
            strip_ansi /tmp/e2e-output.txt
            echo '```'
            echo ""
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Collapsible: Accessibility Test Results ───────────────────────
          {
            echo "<details>"
            echo "<summary>♿ Accessibility Test Results (WCAG 2.1 AA) — ${A11Y_SUMMARY}</summary>"
            echo ""
            echo '```'
            strip_ansi /tmp/a11y-output.txt
            echo '```'
            echo ""
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Conclusion ────────────────────────────────────────────────────
          cat >> "$GITHUB_STEP_SUMMARY" << EOF

          ---

          ## Conclusion: $CONCLUSION

          > $CONCLUSION_TEXT
          EOF

      # ── Enforce: fail the job if any gate failed ───────────────────────────
      - name: Enforce Gates
        if: always()
        env:
          BUILD:      ${{ steps.build.outcome }}
          TESTS:      ${{ steps.unit-tests.outcome }}
          E2E:        ${{ steps.e2e-tests.outcome }}
          A11Y:       ${{ steps.a11y.outcome }}
          VULN_CHECK: ${{ steps.vuln-check.outcome }}
        run: |
          FAILED=""
          [ "$BUILD"      != "success" ] && FAILED="$FAILED\n  ❌ Build"
          [ "$TESTS"      != "success" ] && FAILED="$FAILED\n  ❌ Unit Tests & Coverage (<80%)"
          [ "$E2E"        != "success" ] && FAILED="$FAILED\n  ❌ E2E Tests (Playwright)"
          [ "$A11Y"       != "success" ] && FAILED="$FAILED\n  ❌ Accessibility — WCAG 2.1 AA"
          [ "$VULN_CHECK" != "success" ] && FAILED="$FAILED\n  ❌ Vulnerability Check (high severity found)"

          if [ -n "$FAILED" ]; then
            echo "::error::No-Go — the following gates failed:$(printf "$FAILED")"
            exit 1
          fi

          echo "All quality gates passed — Go ✅"

  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build Pages Artifact
    needs: quality-gates
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /ai-sdlc-dashboard/

      - name: Copy metrics into dist
        run: mkdir -p dist/metrics && cp metrics/*.json dist/metrics/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
